name: RunaGen AI - Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Python code
        continue-on-error: true
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Validate project structure
        run: |
          echo "Checking project structure..."
          test -d src/api && echo "✓ API module found"
          test -d src/ml && echo "✓ ML module found"
          test -d src/features && echo "✓ Features module found"
          test -d web && echo "✓ Web UI found"
          test -f requirements.txt && echo "✓ Requirements file found"
          echo "✓ Project structure validated"

      - name: Test imports
        run: |
          python3 -c "import sys; sys.path.insert(0, 'src'); print('✓ Python path configured')"
          python3 -c "import pandas; print('✓ Pandas imported')"
          python3 -c "import numpy; print('✓ NumPy imported')"
          python3 -c "import sklearn; print('✓ Scikit-learn imported')"

      - name: Check model files
        continue-on-error: true
        run: |
          if [ -d "models" ]; then
            echo "Model files found:"
            ls -lh models/*.pkl 2>/dev/null || echo "No .pkl files in models directory"
          else
            echo "Models directory not found (this is OK for CI/CD)"
          fi

      - name: Build summary
        run: |
          echo "=========================================="
          echo "✓ Build completed successfully!"
          echo "=========================================="
          echo "Python version: $(python3 --version)"
          echo "Pip version: $(pip --version)"
          echo "=========================================="
